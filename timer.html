<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FOCUS TIMER</title>
<style>
  :root{
    --bg: oklch(0.96 0.04 95);
    --ink: oklch(0.18 0.03 280);
    --pink: oklch(0.78 0.19 0);
    --lime: oklch(0.88 0.21 130);
    --cyan: oklch(0.82 0.14 215);
    --orange: oklch(0.74 0.19 45);
    --purple: oklch(0.55 0.22 300);
    --shadow: 6px 6px 0 0 var(--ink);
    --shadow-lg: 10px 10px 0 0 var(--ink);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height:100vh;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }
  .blob{position:fixed; border-radius:9999px; filter:blur(80px); opacity:.55; pointer-events:none; z-index:0}
  .blob.a{width:380px;height:380px;background:var(--pink);top:-120px;left:-120px}
  .blob.b{width:460px;height:460px;background:var(--cyan);top:30%;right:-160px}
  .blob.c{width:420px;height:420px;background:var(--lime);bottom:-160px;left:25%}

  .wrap{position:relative; z-index:1; max-width: 980px; margin: 0 auto}
  header{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom: 24px}
  h1{font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 900; letter-spacing:-0.04em; line-height:1; margin:0}
  h1 .tag{display:inline-block; margin-left:.4rem; padding: .25rem .6rem; background: var(--ink); color: var(--bg); transform: rotate(-3deg)}
  .meta{font-size:.7rem; letter-spacing:.3em; text-transform:uppercase; opacity:.7}

  .card{
    border: 2px solid var(--ink);
    border-radius: 28px;
    background: var(--bg);
    box-shadow: var(--shadow-lg);
    padding: 32px;
  }
  .controls{display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-bottom: 32px}
  @media (max-width: 720px){ .controls{grid-template-columns:1fr} }

  .field{
    position:relative; border:2px solid var(--ink); border-radius:18px; padding:16px;
    background: var(--bg); box-shadow: var(--shadow);
  }
  .field .label{
    position:absolute; top:-12px; left:12px; padding: 2px 8px; font-size:10px;
    text-transform:uppercase; letter-spacing:.2em; font-weight:700;
    border:2px solid var(--ink); border-radius:6px;
  }
  .field .label.pink{background:var(--pink)}
  .field .label.lime{background:var(--lime)}
  .field .label.cyan{background:var(--cyan)}
  .field .value{font-size: 2.25rem; font-weight: 900; padding-top: 8px; font-variant-numeric: tabular-nums}

  /* dropdown */
  .dd{position:relative}
  .dd-btn{
    width:100%; display:flex; align-items:center; justify-content:space-between;
    background:transparent; border:0; padding:8px 0; font: inherit; cursor:pointer;
    font-size: 2.25rem; font-weight: 900; color: var(--ink); font-variant-numeric: tabular-nums;
  }
  .dd-btn .chev{
    width:32px; height:32px; border:2px solid var(--ink); border-radius:9999px;
    display:inline-flex; align-items:center; justify-content:center; font-size:1rem;
    transition: transform .2s;
  }
  .dd-btn:hover .chev{transform: rotate(180deg)}
  .dd.pink .chev{background:var(--pink)}
  .dd.lime .chev{background:var(--lime)}
  .dd-menu{
    position:absolute; left:0; right:0; top:calc(100% + 10px); z-index:30;
    border:2px solid var(--ink); border-radius:16px; background:var(--bg);
    box-shadow: var(--shadow); padding: 8px; max-height: 260px; overflow:auto;
    display:none;
  }
  .dd.open .dd-menu{display:block}
  .dd-grid{display:grid; grid-template-columns: repeat(3, 1fr); gap:6px}
  .dd-grid button{
    padding: 8px 0; border:2px solid var(--ink); border-radius:10px; background:var(--bg);
    font-weight:900; font-size:1.1rem; cursor:pointer; font-variant-numeric: tabular-nums;
    transition: transform .15s;
  }
  .dd-grid button:hover{transform: translateY(-2px)}
  .dd-grid button.active{background: var(--accent, var(--pink))}

  /* timer display */
  .timer{position:relative; display:flex; flex-direction:column; align-items:center; padding: 32px 0}
  .ring{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  }
  .ring > div{
    width: min(380px, 80vw); height: min(380px, 80vw); border-radius:9999px; opacity:.2;
    background: conic-gradient(var(--orange) var(--rp,0%), transparent var(--rp,0%));
  }
  .time{
    position:relative; font-weight:900; line-height:1; letter-spacing:-0.04em;
    font-variant-numeric: tabular-nums; font-size: clamp(5rem, 18vw, 13rem);
    text-shadow: 6px 6px 0 var(--ink);
  }
  .time.running{ text-shadow: 6px 6px 0 var(--pink) }
  .time .sep{opacity:.6}
  .round-label{position:relative; margin-top:12px; font-size:.8rem; letter-spacing:.4em; text-transform:uppercase; opacity:.8}
  .round-label b{font-weight:900; font-size:1rem}

  /* progress bar */
  .bar{margin-top: 24px}
  .bar .track{height:14px; border:2px solid var(--ink); border-radius:9999px; overflow:hidden}
  .bar .fill{height:100%; width:0%;
    background: linear-gradient(90deg, var(--pink), var(--orange), var(--lime), var(--cyan));
    transition: width .5s;
  }
  .bar .legend{display:flex; justify-content:space-between; font-size:10px; letter-spacing:.2em; text-transform:uppercase; opacity:.6; margin-top:6px}

  /* buttons */
  .actions{margin-top: 36px; display:flex; flex-wrap:wrap; gap:16px; justify-content:center}
  .btn{
    padding: 12px 28px; border-radius:9999px; border:2px solid var(--ink);
    font-weight:900; text-transform:uppercase; letter-spacing:.15em; font-size:.85rem;
    background: var(--bg); color: var(--ink); cursor:pointer; box-shadow: var(--shadow);
    transition: transform .12s, box-shadow .12s;
  }
  .btn:hover{transform: translateY(-2px)}
  .btn:active{transform: translate(4px,4px); box-shadow:none}
  .btn.start{background: var(--lime)}
  .btn.start.running{background: var(--pink)}
  .btn.skip{background: var(--cyan)}

  footer{margin-top: 24px; text-align:center; font-size:10px; letter-spacing:.4em; text-transform:uppercase; opacity:.6}
</style>
</head>
<body>
  <div class="blob a"></div>
  <div class="blob b"></div>
  <div class="blob c"></div>

  <div class="wrap">
    <header>
      <h1>FOCUS<span class="tag">TIMER</span></h1>
      <div class="meta">v.01 // get in the zone</div>
    </header>

    <section class="card">
      <div class="controls">
        <div class="field">
          <div class="label pink">Rounds</div>
          <div class="dd pink" id="ddRounds" style="--accent: var(--pink)">
            <button class="dd-btn" type="button">
              <span class="dd-value">5</span><span class="chev">▾</span>
            </button>
            <div class="dd-menu"><div class="dd-grid"></div></div>
          </div>
        </div>
        <div class="field">
          <div class="label lime">Minutes / Round</div>
          <div class="dd lime" id="ddMinutes" style="--accent: var(--lime)">
            <button class="dd-btn" type="button">
              <span class="dd-value">6</span><span class="chev">▾</span>
            </button>
            <div class="dd-menu"><div class="dd-grid"></div></div>
          </div>
        </div>
        <div class="field">
          <div class="label cyan">Total (min)</div>
          <div class="value" id="totalMin">30</div>
        </div>
      </div>

      <div class="timer">
        <div class="ring"><div id="ring"></div></div>
        <div class="time" id="time">06<span class="sep">:</span>00</div>
        <div class="round-label">Round <b id="curRound">1</b> / <span id="totRound">5</span></div>
      </div>

      <div class="bar">
        <div class="track"><div class="fill" id="fill"></div></div>
        <div class="legend"><span>Start</span><span id="pct">0%</span><span>Finish</span></div>
      </div>

      <div class="actions">
        <button class="btn start" id="btnStart">Start</button>
        <button class="btn" id="btnReset">Reset</button>
        <button class="btn skip" id="btnSkip">Skip Round →</button>
      </div>
    </section>

    <footer>breathe in · breathe out · ship it</footer>
  </div>

<script>
  const ROUND_OPTS = [1,2,3,4,5,6,7,8,10,12];
  const MIN_OPTS   = [1,2,3,5,6,10,15,20,25,30,45,60];

  let rounds = 5, minutes = 6, currentRound = 1, secondsLeft = minutes*60, running = false, timer = null;

  function buildDropdown(id, options, getVal, setVal){
    const root = document.getElementById(id);
    const grid = root.querySelector('.dd-grid');
    const btn = root.querySelector('.dd-btn');
    const valEl = root.querySelector('.dd-value');
    function render(){
      valEl.textContent = getVal();
      grid.innerHTML = '';
      options.forEach(n => {
        const b = document.createElement('button');
        b.type = 'button'; b.textContent = n;
        if(n === getVal()) b.classList.add('active');
        b.onclick = () => { setVal(n); root.classList.remove('open'); render(); update(); };
        grid.appendChild(b);
      });
    }
    btn.onclick = (e) => { e.stopPropagation(); root.classList.toggle('open'); };
    render();
    return render;
  }

  const renderR = buildDropdown('ddRounds', ROUND_OPTS, () => rounds,  n => { rounds = n; if(!running){ currentRound=1; secondsLeft=minutes*60; }});
  const renderM = buildDropdown('ddMinutes', MIN_OPTS,  () => minutes, n => { minutes = n; if(!running){ currentRound=1; secondsLeft=minutes*60; }});

  document.addEventListener('click', () => {
    document.querySelectorAll('.dd.open').forEach(d => d.classList.remove('open'));
  });

  function update(){
    const totalSecs = rounds * minutes * 60;
    const elapsed = (currentRound - 1) * minutes * 60 + (minutes*60 - secondsLeft);
    const progress = Math.min(100, (elapsed/totalSecs)*100);
    const roundProgress = ((minutes*60 - secondsLeft)/(minutes*60))*100;
    const mm = String(Math.floor(secondsLeft/60)).padStart(2,'0');
    const ss = String(secondsLeft%60).padStart(2,'0');
    document.getElementById('time').innerHTML = mm + '<span class="sep">:</span>' + ss;
    document.getElementById('time').classList.toggle('running', running);
    document.getElementById('curRound').textContent = currentRound;
    document.getElementById('totRound').textContent = rounds;
    document.getElementById('totalMin').textContent = rounds * minutes;
    document.getElementById('fill').style.width = progress + '%';
    document.getElementById('pct').textContent = Math.round(progress) + '%';
    document.getElementById('ring').style.setProperty('--rp', roundProgress + '%');
    const btn = document.getElementById('btnStart');
    btn.classList.toggle('running', running);
    btn.textContent = running ? 'Pause' : (currentRound === 1 && secondsLeft === minutes*60 ? 'Start' : 'Resume');
  }

  function tick(){
    if(secondsLeft > 1){ secondsLeft--; update(); return; }
    if(currentRound >= rounds){ running=false; clearInterval(timer); timer=null; secondsLeft=0; update(); return; }
    currentRound++; secondsLeft = minutes*60; update();
  }

  document.getElementById('btnStart').onclick = () => {
    running = !running;
    if(running){ timer = setInterval(tick, 1000); }
    else { clearInterval(timer); timer=null; }
    update();
  };
  document.getElementById('btnReset').onclick = () => {
    running=false; clearInterval(timer); timer=null;
    currentRound=1; secondsLeft = minutes*60; update();
  };
  document.getElementById('btnSkip').onclick = () => {
    running=false; clearInterval(timer); timer=null;
    if(currentRound < rounds){ currentRound++; secondsLeft = minutes*60; }
    update();
  };

  update();
</script>
</body>
</html>
