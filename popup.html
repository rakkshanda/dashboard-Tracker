<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Save Job</title>
    <style>
      :root {
        --acc: #FF5C2C;
        --acc-2: #FFD93D;
        --acc-3: #6BE3B0;
        --acc-5: #FF8FB1;
        --acc-6: #4DA3FF;
        --ink: #0E0E10;
        --ink-2: #2A2A2E;
        --ink-3: #5C5C63;
        --bg: #F2EFE8;
        --bg-2: #ECE7DC;
        --card: #FFFFFF;
        --line: #1B1B1F;
        --line-soft: #E1DACB;
        --sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
        --display: 'Bricolage Grotesque', -apple-system, sans-serif;
        --radius: 14px;
        --radius-sm: 8px;
      }
      *{box-sizing:border-box;margin:0;padding:0}
      body { font-family: var(--sans);  background: var(--bg); color: var(--ink); padding: 25px 40px 10px 40px; -webkit-font-smoothing: antialiased; }
      h3 { font-family: var(--display); font-size: 17px; font-weight: 800; color: var(--ink); }
      label { display: block; font-family: var(--mono); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-3); margin-top: 10px; margin-bottom: 4px; }
      input, textarea {
        width: 100%; padding: 8px 10px;
        border: 1.5px solid var(--line-soft); border-radius: var(--radius-sm);
        font-size: 13px; font-family: var(--sans);
        background: var(--card); color: var(--ink);
        outline: none; transition: border-color .15s;
      }
      input:focus, textarea:focus { border-color: var(--acc); }
      select {
        width: 100%; padding: 8px 10px;
        border: 1.5px solid var(--line-soft); border-radius: var(--radius-sm);
        background: var(--card); color: var(--ink);
        font-size: 13px; font-family: var(--sans); outline: none;
        transition: border-color .15s;
      }
      select:focus { border-color: var(--acc); }
      textarea { min-height: 60px; resize: vertical; }
      .hint { font-family: var(--mono); font-size: 9px; color: var(--ink-3); margin-top: 3px; letter-spacing: .04em; }
      .row-actions { margin-top: 3px; display: flex; gap: 6px; }
      .link { font-size: 11px; color: var(--acc-6); cursor: pointer; text-decoration: underline; }
      button { padding: 7px 12px; border: 1.5px solid var(--line); border-radius: 999px; cursor: pointer; font-family: var(--sans); font-size: 12px; font-weight: 600; transition: all .15s; }
      .header-btn { background: var(--ink); color: var(--bg); border-color: var(--ink); }
      .header-btn:hover { opacity: .8; }
      #status { display: none; }
      .status-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
      .status-tab { flex: 1 1 calc(50% - 5px); min-width: 100px; padding: 6px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--line-soft); background: var(--card); font-size: 11px; font-weight: 600; color: var(--ink-2); font-family: var(--sans); text-transform: capitalize; transition: all .15s; }
      .status-tab:hover { border-color: var(--acc); color: var(--ink); }
      .status-tab.active { background: var(--acc); color: var(--ink); border-color: var(--acc); box-shadow: 3px 3px 0 var(--line); }
      .status-tabs.disabled .status-tab { opacity: 0.5; pointer-events: none; }
      .location-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
      .location-tab { flex: 1 1 calc(50% - 5px); min-width: 80px; padding: 6px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--line-soft); background: var(--card); font-size: 11px; font-weight: 600; color: var(--ink-2); font-family: var(--sans); transition: all .15s; }
      .location-tab:hover { border-color: var(--acc); color: var(--ink); }
      .location-tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); box-shadow: 3px 3px 0 var(--acc); }
      .location-tabs.disabled .location-tab { opacity: 0.5; pointer-events: none; }
      .missing { border-color: #f33 !important; }
      #close { background: none !important; border-color: transparent !important; color: var(--ink-3) !important; width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: 50% !important; }
      #close:hover { background: var(--bg-2) !important; color: var(--ink) !important; }
      .role-tag-tab { border-radius: var(--radius-sm) !important; border: 1.5px solid var(--line-soft) !important; font-family: var(--mono) !important; font-size: 10px !important; font-weight: 700 !important; letter-spacing: .06em !important; transition: all .15s !important; }
      .role-tag-tab[data-tag="sde"] { background: #dbeafe !important; color: #1d4ed8 !important; border-color: #bfdbfe !important; }
      .role-tag-tab[data-tag="pm"] { background: #fce7f3 !important; color: #9d174d !important; border-color: #fbcfe8 !important; }
      .role-tag-tab[data-tag="data"] { background: #dcfce7 !important; color: #166534 !important; border-color: #bbf7d0 !important; }
      .role-tag-tab.active[data-tag="sde"] { background: #3b82f6 !important; color: #fff !important; border-color: #3b82f6 !important; box-shadow: 3px 3px 0 var(--line); }
      .role-tag-tab.active[data-tag="pm"] { background: #ec4899 !important; color: #fff !important; border-color: #ec4899 !important; box-shadow: 3px 3px 0 var(--line); }
      .role-tag-tab.active[data-tag="data"] { background: #22c55e !important; color: #fff !important; border-color: #22c55e !important; box-shadow: 3px 3px 0 var(--line); }

      /* SAVE BUTTON */
      button#save {
        background: #FF5C2C; color: #0E0E10; border: 2.5px solid #0E0E10;
        border-radius: 999px; font-weight: 800; font-family: var(--sans);
        font-size: 13px; padding: 10px 20px;
        box-shadow: 5px 5px 0 #0E0E10;
        transition: all .15s ease;
        letter-spacing: .01em;
      }
      button#save:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 #0E0E10; }
      button#save:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #0E0E10; }
      #save.saving { background: var(--acc-6); color: #fff; }
      #save.success { background: var(--acc-3); color: var(--ink); animation: pop .4s ease; }
      #save.error { background: var(--acc-5); color: var(--ink); animation: shake .3s ease; }

      #save .spinner {
        width: 14px; height: 14px; border-radius: 50%;
        border: 2px solid rgba(0,0,0,.2); border-top-color: var(--ink);
        animation: spin .8s linear infinite;
        display: inline-block; vertical-align: -2px; margin-right: 6px;
      }
      #progress {
        height: 3px; width: 0%;
        background: linear-gradient(90deg, var(--acc-6), var(--acc-3));
        border-radius: 999px; transition: width .4s ease; margin-top: 6px;
      }
      #status { margin-top: 8px; font-size: 12px; min-height: 16px; color: var(--ink-3); }
      #statusMessage {
        display: none; margin-top: 8px; padding: 8px 12px;
        border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; text-align: center;
        border: 1.5px solid transparent;
      }
      #statusMessage.visible { display: block; }
      #statusMessage.success { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
      #statusMessage.error   { background: #ffe4e6; color: #9f1239; border-color: #fda4af; }
      #statusMessage.saving  { background: #e0f2fe; color: #0369a1; border-color: #7dd3fc; }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pop  { 0%{transform:scale(.95)} 60%{transform:scale(1.02)} 100%{transform:scale(1)} }
      @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }

      .ai-loading { position: relative; color: var(--ink-3) !important; pointer-events: none; }
      .ai-loading::after {
        content: ''; position: absolute; right: -20px; top: 50%; transform: translateY(-50%);
        width: 12px; height: 12px; border: 2px solid var(--line-soft); border-top-color: var(--acc);
        border-radius: 50%; animation: spin 1s linear infinite;
      }
      .ai-processing {
        background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg) 50%, var(--bg-2) 75%);
        background-size: 200% 100%; animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      .ai-status-loading { display: block !important; color: var(--acc-6); }
      .ai-status-loading::before { content: '🤖 '; animation: pulse 1.5s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
      .skeleton-loading {
        background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg) 50%, var(--bg-2) 75%);
        background-size: 200% 100%; animation: skeleton-shimmer 1.5s infinite;
        color: transparent !important; pointer-events: none; border-color: var(--line-soft) !important;
      }
      .skeleton-loading::placeholder { color: transparent; }
      @keyframes skeleton-shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

      /* Header area */
      .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1.5px solid var(--line-soft); }
    </style>
  </head>
  <body>
    <div id="loadingMask" style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.85); z-index:9999; align-items:center; justify-content:center; font-size:14px; color:#444;">
      <div>
        <div class="spinner" style="margin:0 auto 8px auto"></div>
        Loading job info…
      </div>
    </div>
    <div class="popup-header">
      <div style="display: flex; gap: 10px; align-items: center;">
        <button type="button" id="starToggle" title="Star this job" aria-pressed="false" style="background:none;border:none;cursor:pointer;font-size:20px;padding:0 4px;line-height:1;color:var(--ink-3);transition:color 0.15s;">&#9734;</button>
        <button type="button" id="save" title="Save job">Save Job</button>
        <button type="button" id="clearTop" class="header-btn" title="Clear all fields">Clear</button>
        <button type="button" id="redoTop" class="header-btn" title="Redo">Redo</button>
      </div>
      <button type="button" id="close">×</button>
    </div>

    <div class="role-tag-tabs" id="roleTagTabs" style="display:flex;gap:6px;margin-bottom:6px;">
      <button type="button" class="role-tag-tab" data-tag="sde"  style="flex:1;padding:5px 8px;border-radius:8px;border:1.5px solid #bfdbfe;background:#dbeafe;color:#1d4ed8;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;">SDE</button>
      <button type="button" class="role-tag-tab" data-tag="pm"   style="flex:1;padding:5px 8px;border-radius:8px;border:1.5px solid #bbf7d0;background:#dcfce7;color:#166534;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;">PM</button>
      <button type="button" class="role-tag-tab" data-tag="data" style="flex:1;padding:5px 8px;border-radius:8px;border:1.5px solid #fbcfe8;background:#fce7f3;color:#9d174d;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;">Data</button>
    </div>

    <label>Company</label>
    <input id="company" />

    <label>Job title</label>
    <input id="title" />
    

    <label>Location</label>
    <div class="location-tabs" id="locationTabs">
      <button type="button" class="location-tab" data-value="NYC" aria-pressed="false">NYC</button>
      <button type="button" class="location-tab" data-value="SF" aria-pressed="false">SF</button>
      <button type="button" class="location-tab" data-value="Remote" aria-pressed="false">Remote</button>
      <button type="button" class="location-tab" data-value="Seattle" aria-pressed="false">Seattle</button>
    </div>
    <input id="location" />

    <label>Job ID (optional)</label>
    <input id="jobId" />

    <label>Status</label>
    <div class="status-tabs" id="statusTabs">
      <button type="button" class="status-tab" data-value="saved" aria-pressed="false">Saved</button>
      <button type="button" class="status-tab" data-value="applied" aria-pressed="true">Applied</button>
      <button type="button" class="status-tab" data-value="resume_screening">Resume Screening</button>
      <button type="button" class="status-tab" data-value="interview">Interview</button>
      <button type="button" class="status-tab" data-value="offer">Offer</button>
      <button type="button" class="status-tab" data-value="rejected">Rejected</button>
      <button type="button" class="status-tab" data-value="withdrawn">Withdrawn</button>
      <button type="button" class="status-tab" data-value="ended">Ended</button>
    </div>
    <!-- Hidden select remains for data model/backward compat; kept in sync via JS -->
    <select id="status" aria-hidden="true" tabindex="-1" style="position:absolute;left:-9999px;">
      <option value="saved">Saved</option>
      <option value="applied" selected>Applied</option>
      <option value="resume_screening">Resume Screening</option>
      <option value="interview">Interview</option>
      <option value="offer">Offer</option>
      <option value="rejected">Rejected</option>
      <option value="withdrawn">Withdrawn</option>
      <option value="ended">Ended</option>
    </select>

    <label>Source</label>
    <select id="source">
      <option value="URL" selected>URL</option>
      <option value="LinkedIn">LinkedIn</option>
      <option value="Handshake">Handshake</option>
      <option value="Indeed">Indeed</option>
    </select>

    <label>Link</label>
    <input id="url" />

    <label>Job description</label>
    <textarea id="description"></textarea>
    <div class="row-actions">
      <span class="hint" id="descCount">0 chars</span>
    </div>
    <div id="progress"></div>
    <div id="statusMessage"></div>
    <div class="hint" id="validationHint" style="display:none">
      ⛔ Please add at least a job title and a link.
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
